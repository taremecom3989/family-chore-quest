<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>おてつだいクエスト</title>
  <style>
    :root{--bg:#fff8dc;--ink:#3a2a1a;--card:#fff;--main:#ff8a3d;--sub:#5cc8ff;--green:#45b36b;--yellow:#ffd45a;--blue:#89b8ff;--gray:#eef3f7;--pink:#ff8fc7;--shadow:0 8px 20px rgba(72,42,10,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(#fff4bf,#e9fbff);color:var(--ink);font-size:16px} 
    header{padding:18px 14px 10px;text-align:center;background:linear-gradient(135deg,#ffcf54,#ff8a3d);color:#fff;border-radius:0 0 28px 28px;box-shadow:var(--shadow)}
    h1{margin:0;font-size:2rem;text-shadow:0 2px 0 rgba(0,0,0,.08)} h2{margin:8px 0 12px;font-size:1.35rem} h3{margin:10px 0 8px}.tagline{margin:6px 0 0;font-weight:700}
    main{max-width:760px;margin:0 auto;padding:12px 12px 92px}.tabs{position:sticky;top:0;z-index:5;display:flex;gap:8px;overflow:auto;padding:10px 4px;background:rgba(255,248,220,.92);backdrop-filter:blur(8px)}
    .tab{border:0;border-radius:999px;padding:12px 14px;background:#fff;box-shadow:var(--shadow);font-weight:800;white-space:nowrap;color:var(--ink)}.tab.active{background:#3bc7a5;color:#fff}
    .section{display:none}.section.active{display:block}.card{background:rgba(255,255,255,.94);border-radius:22px;padding:14px;margin:12px 0;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,.9)}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.child{display:flex;gap:8px;align-items:center}.icon{font-size:2rem}.small{font-size:.86rem;color:#6b5b4d}.big{font-size:1.2rem;font-weight:900}.pill{display:inline-block;border-radius:999px;padding:5px 9px;font-weight:800;margin:2px}.pending{background:#fff0ad;color:#8a5a00}.approved{background:#d9f8df;color:#176b34}.rejected{background:#e7f0ff;color:#315b91}
    button,.btn,select,input,textarea{font:inherit} select,input,textarea{width:100%;padding:13px;border:2px solid #e9dfc8;border-radius:14px;background:#fff;margin:6px 0 12px} textarea{min-height:72px}.btn,button.action{width:100%;border:0;border-radius:18px;padding:14px 16px;margin:6px 0;background:var(--main);color:#fff;font-weight:900;box-shadow:var(--shadow)}.btn.secondary{background:var(--sub)}.btn.green{background:var(--green)}.btn.gray{background:#78909c}.btn.pink{background:var(--pink)}
    .row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.check{display:flex;align-items:center;gap:8px;background:#fff7dc;border-radius:14px;padding:10px;margin:6px 0}.check input{width:auto;margin:0}.barWrap{background:#edf2f7;border-radius:999px;overflow:hidden;height:28px}.bar{height:100%;min-width:24px;border-radius:999px;background:linear-gradient(90deg,#61d394,#2ab7ca);color:#fff;font-weight:900;padding:4px 8px;white-space:nowrap}.rank{display:flex;align-items:center;gap:10px}.rank .medal{font-size:2rem}.notice{background:#fff3cd;border-left:7px solid #ffb300;border-radius:14px;padding:10px}.danger{background:#ef5350!important}.safe{font-size:.82rem;text-align:center;margin:18px 0;color:#6b5b4d}.hidden{display:none!important}@media(min-width:650px){.grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<header><h1>🌈 おてつだいクエスト</h1><p class="tagline">じぶんからできた！をふやす家族のクエストアプリ</p></header>
<main>
  <nav class="tabs" id="tabs"></nav>
  <section id="home" class="section"></section><section id="quest" class="section"></section><section id="approval" class="section"></section><section id="charts" class="section"></section><section id="badges" class="section"></section><section id="rewards" class="section"></section><section id="history" class="section"></section>
  <p class="safe">このアプリは家族内で使うためのものです。データはこのブラウザの中だけに保存され、外部には送信されません。</p>
</main>
<script>
// ===== データモデル =====
// records は「クエスト申請1件」を表します。pending は申請中、approved は承認済み、rejected は「もう一回チャレンジ」です。
// 大切なルール: ポイント・ランキング・グラフ・バッジ・おこづかい計算は approved だけを使います。
const STORAGE_KEY = 'otetsudaiQuestDataV1';
const tabs = [{id:'home',label:'🏠 ホーム'},{id:'quest',label:'⚔️ クエスト申請'},{id:'approval',label:'👨‍👩‍👧 承認'},{id:'charts',label:'🏆 ランキング・グラフ'},{id:'badges',label:'🎖️ バッジ'},{id:'rewards',label:'🎁 ごほうび'},{id:'history',label:'📝 履歴・設定'}];
const children = [
 {id:'ei',name:'Ei',gender:'boy',ageGroup:'小学生高学年',style:'頼れるリーダー',icon:'🦁',cap:500},
 {id:'ju',name:'Ju',gender:'girl',ageGroup:'小学生低学年',style:'コツコツがんばる',icon:'🐰',cap:300},
 {id:'ka',name:'Ka',gender:'girl',ageGroup:'幼稚園',style:'にこにこチャレンジャー',icon:'🐣',cap:200},
 {id:'ke',name:'Ke',gender:'boy',ageGroup:'幼稚園',style:'ちびっこ勇者',icon:'🐹',cap:200}
];
const categories = ['おてつだい','ペットのおせわ','じぶんのこと','時間を守る','学校・幼稚園準備','きょうだい・家族サポート','生活マナー','特別クエスト'];
const questNames = {
'おてつだい':['食器を運ぶ','食後の食器を下げる','箸を並べる','コップを並べる','テーブルを拭く','おもちゃを片付ける','リビングの床の物を片付ける','クッションを整える','本や絵本を棚に戻す','洗濯物をカゴに入れる','タオルをたたむ','自分の服をたたむ','靴下をペアにする','服を引き出しにしまう','ハンガーを集める','靴をそろえる','郵便物を親に渡す','タオルを準備する','バスマットを干す','洗面台の水はねを拭く'],
'ペットのおせわ':['うさぎの水を確認する','うさぎのごはん準備を手伝う','うさぎの牧草を確認する','うさぎの様子を観察して親に伝える','うさぎのケージ周りを軽く片付ける','ハムスターの水を確認する','ハムスターのごはん準備を手伝う','ハムスターの床材チェックをする','ハムスターの様子を観察して親に伝える','ペットのおせわチェックをする'],
'じぶんのこと':['帰ってきて手を洗う','うがいをする','歯みがきに自分で行く','パジャマに着替える','朝の着替えを自分でする','パジャマをたたむ','ランドセルやかばんを片付ける','水筒を出す','給食袋を出す','寝る前に部屋を片付ける','朝、自分で起きる','朝の支度を時間内に終える'],
'時間を守る':['YouTubeを約束の時間でやめる','ゲームを約束の時間でやめる','見る前に時間を決める','「あと5分」で本当に終わる','YouTube後にすぐ次の行動へ移る','寝る30分前はスクリーンを見ない','ノースクリーン30分にチャレンジする','時間になったら自分で寝る準備を始める','タイマーが鳴ったら自分で切り替える','親に言われる前に動画を止める'],
'学校・幼稚園準備':['明日の学校準備をする','明日の幼稚園準備をする','連絡帳を出す','宿題を始める','宿題を終わらせる','音読をする','鉛筆を削る','体操服を準備する','ハンカチとティッシュを準備する','翌日の服を準備する'],
'きょうだい・家族サポート':['弟や妹の準備を手伝う','兄弟にやさしく教える','泣いている兄弟に声をかける','兄弟と一緒に片付ける','家族にありがとうを言う','けんかの後に仲直りする','親に「何か手伝う？」と聞く','兄弟を誘ってクエストをする','家族の荷物を運ぶ','今日の家族MVPを選ぶ'],
'生活マナー':['ただいまを言う','いただきますを言う','ごちそうさまを言う','ありがとうを言う','ごめんなさいを言う','靴をそろえる','脱いだ服を洗濯カゴに入れる','食事中に座って食べる','おもちゃを使ったら戻す','トイレの後に手を洗う'],
'特別クエスト':['ベランダ掃除を手伝う','大掃除を手伝う','買い物した物をしまう','旅行の準備を手伝う','お弁当準備を手伝う','ゴミ出しを手伝う','家族会議に参加する','週末の片付けタイムに参加する','ペット周りの大掃除を手伝う','1日3クエスト達成する']
};
const quests = Object.entries(questNames).flatMap(([cat,names])=>names.map((name,i)=>{let pts=[5,10,15,20,30][Math.min(4,Math.floor(i/4))];return {id:cat.slice(0,2)+i,name,category:cat,basePoints:pts,difficulty:['かんたん','ふつう','がんばった','すごい','とくべつ'][Math.min(4,Math.floor(i/4))],targetAge:i%5===0?'小学生以上':i%7===0?'高学年以上':i%3===0?'幼稚園OK':'全員'};}));
let data;
// ===== localStorage 永続化 =====
function loadData(){const saved=localStorage.getItem(STORAGE_KEY);data=saved?JSON.parse(saved):{records:[],rewardMemos:{},paid:{},caps:Object.fromEntries(children.map(c=>[c.id,c.cap]))};}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}
const $=id=>document.getElementById(id); const approved=()=>data.records.filter(r=>r.status==='approved');
const todayKey=()=>new Date().toISOString().slice(0,10); function weekStart(d=new Date()){const x=new Date(d);const day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);return x;}
function isThisWeek(iso){return new Date(iso)>=weekStart();} function isToday(iso){return iso&&iso.slice(0,10)===todayKey();}
function fmt(iso){return new Date(iso).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function child(id){return children.find(c=>c.id===id);} function yen(n){return n.toLocaleString('ja-JP')+'円';}
// ===== 申請・承認ワークフロー =====
function addPendingRecord(){const q=quests.find(x=>x.id===$('questSelect').value), c=child($('childSelect').value); const b={beforeTold:$('b1').checked,helpedSibling:$('b2').checked,screenTimeKept:$('b3').checked,parentCheck:$('b4').checked}; const bonus=(b.beforeTold?10:0)+(b.helpedSibling?10:0)+(b.screenTimeKept?10:0)+(b.parentCheck?5:0); data.records.unshift({id:'rec_'+Date.now(),childId:c.id,childName:c.name,questId:q.id,questName:q.name,category:q.category,basePoints:q.basePoints,bonusPoints:bonus,totalPoints:q.basePoints+bonus,bonuses:b,status:'pending',requestedAt:new Date().toISOString(),approvedAt:null,approvedBy:null,rejectedAt:null,parentComment:'',childMemo:$('childMemo').value.trim()}); saveData(); $('questMessage').textContent='申請したよ！パパかママに見てもらおう。承認されたらポイントが入るよ！'; $('childMemo').value=''; renderAll(); showTab('quest');}
function approveRecord(id){const r=data.records.find(x=>x.id===id); r.status='approved'; r.approvedAt=new Date().toISOString(); r.approvedBy=$('parent_'+id).value; r.parentComment=$('comment_'+id).value.trim(); saveData(); renderAll();}
function rejectRecord(id){const r=data.records.find(x=>x.id===id); r.status='rejected'; r.rejectedAt=new Date().toISOString(); r.parentComment=$('comment_'+id).value.trim()||'もう一回チャレンジ！できたらまた申請してね。'; saveData(); renderAll();}
// ===== ポイント・おこづかい計算 =====
function calculateWeeklyPoints(childId){return approved().filter(r=>r.childId===childId&&isThisWeek(r.approvedAt)).reduce((s,r)=>s+r.totalPoints,0);} 
function calculateTotalPoints(childId){return approved().filter(r=>r.childId===childId).reduce((s,r)=>s+r.totalPoints,0);} 
function calculateAllowance(childId){const pt=calculateWeeklyPoints(childId), cap=Number(data.caps[childId]??child(childId).cap); return {points:pt,amount:Math.min(pt,cap),capped:pt>cap,cap};}
function statusLabel(s){return s==='pending'?'<span class="pill pending">申請中</span>':s==='approved'?'<span class="pill approved">承認済み</span>':'<span class="pill rejected">もう一回チャレンジ</span>';}
function bar(label,value,max){const w=max?Math.max(8,value/max*100):8;return `<p><b>${label}</b> ${value}Pt</p><div class="barWrap"><div class="bar" style="width:${w}%">${value}</div></div>`;}
function renderHome(){const todays=approved().filter(r=>isToday(r.approvedAt)).length,pending=data.records.filter(r=>r.status==='pending').length,rec=quests[(new Date().getDate()+data.records.length)%quests.length]; $('home').innerHTML=`<div class="card"><h2>きょうの家族クエストボード</h2><p>3LDKのおうちで、うさぎ🐰とハムスター🐹のおせわも楽しくチャレンジ！</p><div class="grid">${children.map(c=>`<div class="card child"><span class="icon">${c.icon}</span><div><b>${c.name}</b><br><span class="small">${c.ageGroup}<br>${c.style}</span></div></div>`).join('')}</div></div><div class="grid"><div class="card"><div class="big">✅ ${todays}</div><span class="small">今日の承認済み</span></div><div class="card"><div class="big">⏳ ${pending}</div><span class="small">見てもらう申請</span></div></div><div class="card"><h3>今週のおこづかい予定</h3>${children.map(c=>{const a=calculateAllowance(c.id);return `<p>${c.icon} ${c.name}: ${a.points}Pt → ${yen(a.amount)}${a.capped?'（上限）':''}</p>`}).join('')}</div><div class="card notice"><b>今日のおすすめ:</b> ${rec.name}（${rec.category}・${rec.basePoints}Pt）</div><button class="btn" onclick="showTab('quest')">クエスト申請</button><button class="btn secondary" onclick="showTab('approval')">パパ・ママ承認</button><button class="btn green" onclick="showTab('charts')">ランキングを見る</button>`;}
function renderQuestForm(){const cat=$('categorySelect')?.value||categories[0], qid=$('questSelect')?.value; const list=quests.filter(q=>q.category===cat), q=quests.find(x=>x.id===qid)||list[0]; $('quest').innerHTML=`<div class="card"><h2>できたクエストを申請しよう</h2><label>だれ？</label><select id="childSelect">${children.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}</select><label>カテゴリ</label><select id="categorySelect" onchange="renderQuestForm()">${categories.map(c=>`<option ${c===cat?'selected':''}>${c}</option>`).join('')}</select><label>クエスト</label><select id="questSelect" onchange="renderQuestForm()">${list.map(x=>`<option value="${x.id}" ${x.id===q.id?'selected':''}>${x.name}</option>`).join('')}</select><div class="notice">${q.name}<br>${q.basePoints}Pt / ${q.difficulty} / ${q.targetAge}</div><label class="check"><input id="b1" type="checkbox">言われる前にできた +10</label><label class="check"><input id="b2" type="checkbox">きょうだいを手伝った +10</label><label class="check"><input id="b3" type="checkbox">YouTube・ゲーム時間を守れた +10</label><label class="check"><input id="b4" type="checkbox">パパ・ママチェックOK +5</label><textarea id="childMemo" placeholder="メモ（なくてもOK）"></textarea><button class="btn" onclick="addPendingRecord()">できた！申請する</button><p id="questMessage" class="big"></p></div>`;}
function renderApprovalBoard(){const p=data.records.filter(r=>r.status==='pending'); $('approval').innerHTML=`<h2>パパ・ママ承認</h2>${p.length? p.map(r=>`<div class="card"><h3>${child(r.childId).icon} ${r.childName}: ${r.questName}</h3>${statusLabel(r.status)}<p>${r.category} / 基本${r.basePoints}Pt + ボーナス${r.bonusPoints}Pt = <b>${r.totalPoints}Pt</b></p><p class="small">申請: ${fmt(r.requestedAt)}</p><p>メモ: ${r.childMemo||'なし'}</p><select id="parent_${r.id}"><option>パパ</option><option>ママ</option></select><input id="comment_${r.id}" placeholder="やさしいコメント"><button class="btn green" onclick="approveRecord('${r.id}')">承認する</button><button class="btn gray" onclick="rejectRecord('${r.id}')">もう一回チャレンジ</button></div>`).join(''):'<div class="card">今は申請待ちがありません。みんなのチャレンジを待とう！</div>'}`;}
function renderCharts(){const weekly=children.map(c=>({c,pt:calculateWeeklyPoints(c.id),a:calculateAllowance(c.id)})).sort((a,b)=>b.pt-a.pt), maxW=Math.max(1,...weekly.map(x=>x.pt)), maxT=Math.max(1,...children.map(c=>calculateTotalPoints(c.id))); const catPts=categories.map(cat=>({cat,pt:approved().filter(r=>r.category===cat).reduce((s,r)=>s+r.totalPoints,0)})); const maxC=Math.max(1,...catPts.map(x=>x.pt)); const counts=['pending','approved','rejected'].map(s=>data.records.filter(r=>r.status===s).length); $('charts').innerHTML=`<div class="card"><h2>週間ランキング</h2>${weekly.map((x,i)=>`<div class="rank"><span class="medal">${['🥇','🥈','🥉','🌟'][i]}</span><div><b>${x.c.icon} ${x.c.name}</b> ${x.pt}Pt → ${yen(x.a.amount)}${x.a.capped?'（上限）':''}<br><span class="small">${x.c.style}！</span></div></div>`).join('')}</div><div class="card"><h3>今週ポイント棒グラフ</h3>${children.map(c=>bar(c.icon+' '+c.name,calculateWeeklyPoints(c.id),maxW)).join('')}</div><div class="card"><h3>累計ポイント棒グラフ</h3>${children.map(c=>bar(c.icon+' '+c.name,calculateTotalPoints(c.id),maxT)).join('')}</div><div class="card"><h3>カテゴリ別ポイント</h3>${catPts.map(x=>bar(x.cat,x.pt,maxC)).join('')}</div><div class="card"><h3>申請ステータス</h3><p>申請中: ${counts[0]} / 承認済み: ${counts[1]} / もう一回チャレンジ: ${counts[2]}</p></div>`;}
// ===== バッジ計算 =====
function calculateBadges(childId){const rec=approved().filter(r=>r.childId===childId), total=calculateTotalPoints(childId), names=rec.map(r=>r.questName).join(' '), todayAll=children.every(c=>approved().some(r=>r.childId===c.id&&isToday(r.approvedAt))), top=[...children].sort((a,b)=>calculateWeeklyPoints(b.id)-calculateWeeklyPoints(a.id))[0]?.id===childId; const b=[]; if(rec.length>=1)b.push('はじめてのおてつだい'); if(rec.length>=5)b.push('5クエスト達成'); if(rec.length>=10)b.push('10クエスト達成'); if(rec.filter(r=>r.category==='ペットのおせわ').length>=5)b.push('ペットのおせわ係'); if(rec.filter(r=>r.category==='時間を守る').length>=5)b.push('時間管理マスター'); if(rec.filter(r=>r.questName.includes('歯みがき')).length>=5)b.push('歯みがき名人'); if((names.match(/片付け|戻す|しまう|掃除/g)||[]).length>=10)b.push('片付けマスター'); if(rec.filter(r=>r.category==='きょうだい・家族サポート').length>=5)b.push('やさしさヒーロー'); if(top&&calculateWeeklyPoints(childId)>0)b.push('週間MVP'); if(todayAll)b.push('みんなで達成'); if(total>=100)b.push('伝説のおてつだい勇者'); return b;}
function renderBadges(){ $('badges').innerHTML=`<h2>バッジ</h2>${children.map(c=>`<div class="card"><h3>${c.icon} ${c.name}</h3>${calculateBadges(c.id).length?calculateBadges(c.id).map(b=>`<span class="pill approved">🎖️ ${b}</span>`).join(''):'<p class="small">承認されたクエストでバッジがひらくよ！</p>'}</div>`).join('')}`;}
function renderRewards(){ $('rewards').innerHTML=`<h2>ごほうび</h2>${children.map(c=>{const a=calculateAllowance(c.id);return `<div class="card"><h3>${c.icon} ${c.name}</h3><p>${a.points}Pt → ${yen(a.amount)}${a.capped?'（上限）':''}</p><label>今週上限（円）</label><input type="number" value="${a.cap}" onchange="data.caps['${c.id}']=Number(this.value);saveData();renderAll()"><textarea placeholder="ごほうびメモ" onchange="data.rewardMemos['${c.id}']=this.value;saveData()">${data.rewardMemos[c.id]||''}</textarea><label class="check"><input type="checkbox" ${data.paid[c.id]?'checked':''} onchange="data.paid['${c.id}']=this.checked;saveData()">今週のおこづかい支払い済み</label></div>`}).join('')}`;}
function renderHistory(){const fc=$('filterChild')?.value||'all', fs=$('filterStatus')?.value||'all', fcat=$('filterCat')?.value||'all'; let rec=data.records.filter(r=>(fc==='all'||r.childId===fc)&&(fs==='all'||r.status===fs)&&(fcat==='all'||r.category===fcat)); $('history').innerHTML=`<div class="card"><h2>履歴・設定</h2><p>このアプリのデータはこのブラウザの中だけに保存されます。</p><select id="filterChild" onchange="renderHistory()"><option value="all">全員</option>${children.map(c=>`<option value="${c.id}" ${fc===c.id?'selected':''}>${c.name}</option>`).join('')}</select><select id="filterStatus" onchange="renderHistory()"><option value="all">全ステータス</option><option value="pending" ${fs==='pending'?'selected':''}>申請中</option><option value="approved" ${fs==='approved'?'selected':''}>承認済み</option><option value="rejected" ${fs==='rejected'?'selected':''}>もう一回チャレンジ</option></select><select id="filterCat" onchange="renderHistory()"><option value="all">全カテゴリ</option>${categories.map(c=>`<option ${fcat===c?'selected':''}>${c}</option>`).join('')}</select><button class="btn secondary" onclick="exportJson()">JSONエクスポート</button><button class="btn green" onclick="addSampleData()">サンプルデータ追加</button><button class="btn danger" onclick="resetAll()">すべてリセット</button></div>${rec.map(r=>`<div class="card"><b>${child(r.childId).icon} ${r.childName}</b> ${statusLabel(r.status)}<p>${r.questName} / ${r.totalPoints}Pt</p><p class="small">申請 ${fmt(r.requestedAt)} ${r.approvedAt?' / 承認 '+fmt(r.approvedAt):''}</p><p>${r.parentComment||''}</p></div>`).join('')||'<div class="card">履歴はまだありません。</div>'}`;}
function exportJson(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}), a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='otetsudai-quest.json'; a.click();}
function resetAll(){if(confirm('本当にすべてのデータを消しますか？')){localStorage.removeItem(STORAGE_KEY);loadData();renderAll();}}
function addSampleData(){children.forEach((c,i)=>{const q=quests[i*5]; data.records.unshift({id:'sample_'+Date.now()+i,childId:c.id,childName:c.name,questId:q.id,questName:q.name,category:q.category,basePoints:q.basePoints,bonusPoints:10,totalPoints:q.basePoints+10,bonuses:{beforeTold:true,helpedSibling:false,screenTimeKept:false,parentCheck:false},status:'approved',requestedAt:new Date().toISOString(),approvedAt:new Date().toISOString(),approvedBy:'パパ',rejectedAt:null,parentComment:'よくできたね！',childMemo:'サンプル'});}); saveData();renderAll();}
// ===== 画面描画 =====
function showTab(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.id===id));}
function renderAll(){renderHome();renderQuestForm();renderApprovalBoard();renderCharts();renderBadges();renderRewards();renderHistory();}
function init(){loadData();$('tabs').innerHTML=tabs.map(t=>`<button class="tab" data-id="${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`).join('');renderAll();showTab('home');}
init();
</script>
</body>
</html>
